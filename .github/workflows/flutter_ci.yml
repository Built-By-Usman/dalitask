name: Flutter CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

#  1. Convert keystore to Base64
#Run this command to create a Base64 text file:
#  base64 -i android/app/upload-keystore.jks | tr -d '\n' > keystore_base64.txt
#  Copy the content of keystore_base64.txt
#
#  2. Add GitHub secrets
#Add the following 4 secrets in your repository:
#  storePassword=AbdullahIqbal321
#  keyPassword=AbdullahIqbal321
#  keyAlias=upload
#  KEYSTORE_BASE64=<Paste the Base64 text from step 1>
#
#  3. CI/CD workflow steps
#- Decode KEYSTORE_BASE64 to android/app/upload-keystore.jks in CI
#- Dynamically create key.properties using the secrets
#- Build signed App Bundle using:
#    flutter build appbundle --release --no-tree-shake-icons
#
#Note: Do NOT push key.properties or keystore to GitHub. All secrets are used via GitHub Actions.

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4️⃣ Run tests (skip if failing)
      - name: Run tests
        run: flutter test || echo "Skipping failing tests for CI"

      # 5️⃣ Auto increment version code
      - name: Auto increment version code
        run: |
          BUILD_NUMBER=$(grep 'version:' pubspec.yaml | awk -F '+' '{print $2}')
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          sed -i "s/+${BUILD_NUMBER}/+${NEW_BUILD_NUMBER}/" pubspec.yaml

      # 6️⃣ Decode keystore from GitHub secret
      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # 7️⃣ Create key.properties for signing
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.storePassword }}" > android/key.properties
          echo "keyPassword=${{ secrets.keyPassword }}" >> android/key.properties
          echo "keyAlias=${{ secrets.keyAlias }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      # 8️⃣ Accept Android licenses
      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      # 9️⃣ Optional: Debug keystore presence
      - name: List android folder
        run: ls -la android/app

      # 🔟 Build signed release App Bundle from android folder
      - name: Build App Bundle
        working-directory: android
        run: flutter build appbundle --release --no-tree-shake-icons

      # 11️⃣ Upload the generated App Bundle as artifact
      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/build/app/outputs/bundle/release/app-release.aab